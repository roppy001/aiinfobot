# AIニュース収集対象のソース定義
# rss_sources: RSSフィードが確認済みのソース（feedparserで取得）
# scrape_sources: RSSが存在しないため、HTMLスクレイピングで取得するソース
#   list_selector / title_selector / link_selector はCSSセレクタ。
#   サイトのHTML構造は変更されることがあるため、動作しない場合は要調整。

rss_sources:
  - name: "TechCrunch (AI)"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
  - name: "ITmedia AI+"
    url: "https://rss.itmedia.co.jp/rss/2.0/aiplus.xml"
  - name: "OpenAI News"
    url: "https://openai.com/news/rss.xml"
  - name: "Google DeepMind Blog"
    url: "https://deepmind.google/blog/rss.xml"
  - name: "Preferred Networks Tech Blog"
    url: "https://tech.preferred.jp/en/blog/feed/"

scrape_sources:
  - name: "Anthropic News"
    url: "https://www.anthropic.com/news"
    base_url: "https://www.anthropic.com"
    list_selector: "table tr"     # 要確認: テーブル形式の一覧
    title_selector: "a"
    link_selector: "a"

  - name: "Sakana AI Blog"
    url: "https://sakana.ai/blog/"
    base_url: "https://sakana.ai"
    list_selector: "article"      # 要確認
    title_selector: "h2, h3"
    link_selector: "a"

  - name: "NTTデータグループ ニュースリリース"
    url: "https://www.nttdata.com/jp/ja/news/"
    base_url: "https://www.nttdata.com"
    list_selector: "li"           # 要確認
    title_selector: "a"
    link_selector: "a"

  - name: "富士通 プレスリリース"
    url: "https://global.fujitsu/ja-jp/pr"
    base_url: "https://global.fujitsu"
    list_selector: "li"           # 要確認: 日付・タイトル・カテゴリタグ形式のリスト
    title_selector: "a"
    link_selector: "a"

  - name: "日立製作所 プレスリリース"
    url: "https://www.hitachi.com/ja-jp/press/"
    base_url: "https://www.hitachi.com"
    list_selector: "li"           # 要確認
    title_selector: "a"
    link_selector: "a"

  - name: "NEC プレスリリース"
    url: "https://group.nec/global/ja/"
    base_url: "https://group.nec"
    list_selector: "li"           # 要確認: 自動アクセスが403で拒否される可能性が高い（要検証）
    title_selector: "a"
    link_selector: "a"

  - name: "日本アイ・ビー・エム ニュースルーム"
    url: "https://jp.newsroom.ibm.com/announcements"
    base_url: "https://jp.newsroom.ibm.com"
    list_selector: "li"           # 要確認: トップページ(https://jp.newsroom.ibm.com/)の「すべて表示」先
    title_selector: "a"
    link_selector: "a"

  - name: "アクセンチュア ニュースルーム"
    url: "https://newsroom.accenture.jp/"
    base_url: "https://newsroom.accenture.jp"
    list_selector: "li"           # 要確認: JavaScriptで描画されるページの可能性があり、静的取得では0件になる恐れあり
    title_selector: "a"
    link_selector: "a"
